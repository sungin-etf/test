name: ETF Monitor

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 한국시간 09:00
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: python main.py
